<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report History</title>
<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#1f5f3b">
</head>
<body>
<header class="app-header">
  <div>
    <h1>Report History</h1>
    <p>Open and completed maintenance reports</p>
  </div>
</header>
<main class="container">
<section class="card">
  <div class="filters">
    <input id="searchInput" placeholder="Search park, employee, category...">
    <select id="statusFilter">
      <option value="">All Statuses</option>
      <option>Open</option>
      <option>In Progress</option>
      <option>Completed</option>
    </select>
  </div>
  <div id="reportsList">Loading reports...</div>
</section>
<nav class="bottom-nav">
  <a href="index.html">New Report</a>
  <a href="login.html">Admin Login</a>
</nav>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="history.js"></script>
</body>
</html>
