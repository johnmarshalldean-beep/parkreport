<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warren County Park Report</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
<img src="https://gis.vgsi.com/warrencountyva/Images/WARREN_LOGO.PNG" alt="Warren County Seal" class="seal">
<h1>Warren County Park Report</h1>
<p>Help keep our parks safe, clean, and beautiful.</p>
</header>

<main class="container">

<form id="reportForm">

<label for="name">Resident Name</label>
<input type="text" id="name" placeholder="Enter your name" required>

<label for="email">Email Address</label>
<input type="email" id="email" placeholder="Enter your email" required>

<label for="park">Select Park</label>
<select id="park" required>
<option value="">Choose a Park</option>
<option>Burrell Brooks, Jr. Community Park</option>
<option>Chimney Field Park</option>
<option>Dr. Seide Memorial Botanical Gardens</option>
<option>Eastham Park</option>
<option>Florence Smith Memorial Playground</option>
<option>Gertrude E. Miller Community Park</option>
<option>Lions Park</option>
<option>Peter Lehew Park</option>
<option>Rockland Park</option>
<option>Warren County Dog Park</option>
<option>Warren County Skatepark</option>
</select>

<label for="issue">Issue Type</label>
<select id="issue" required>
<option value="">Select Issue</option>
<option>Playground Damage</option>
<option>Graffiti</option>
<option>Trash / Litter</option>
<option>Broken Bench or Table</option>
<option>Trail Issue</option>
<option>Restroom Issue</option>
<option>Fence / Gate Damage</option>
<option>Lighting Problem</option>
<option>Safety Concern</option>
<option>Other</option>
</select>

<label for="description">Description</label>
<textarea id="description" rows="6" placeholder="Describe the problem..." required></textarea>

<label for="photo">Upload Photo</label>
<input type="file" id="photo" accept="image/*">

<button type="submit">Submit Report</button>

</form>

<div id="message"></div>

</main>

<script src="script.js"></script>

</body>
</html>
